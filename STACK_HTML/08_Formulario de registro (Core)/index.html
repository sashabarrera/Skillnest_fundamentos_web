<form action="Registro" method="post">
    <div>
        <label for="Nombre"><strong>Nombre:</strong></label>
        <input type="text" id="nombre" name="nombre">
    </div>
    <br>
    <div>
        <label for="Apellido"><strong>Apellido:</strong></label>
        <input type="text" id="Apellido" name="Apellido">
    </div>
    <br>
    <div>
        <label for="Correo electrónico"><strong>Correo electrónico:</strong></label>
        <input type="text" id="Correo electrónico" name="Correo electrónico" </div>
        <br>
        <div>
            <br>
            <label for="Contraseña"><strong>Contraseña:</strong></label>
            <input type="password" id="Contraseña" name="Contraseña" </div>
            <br>
            <div>
                <br>
                <label for="Confirmar contraseña"><strong>Confirmar contraseña:</strong></label>
                <input type="password" id="Confirmar contraseña" name="Confirmar contraseña" </div>
                <br>
                <div>
                    <br>
                    <label for="Fecha_nacimiento"><strong>Fecha_nacimiento:</strong></label>
                    <input type="date" id="Fecha_nacimiento" name="Fecha_nacimient" </div>
                    <br>
                    <div>
                        <br>
                        <label><strong>Genero:</strong></label>
                        <input type="radio" id="Masculino" name="estilo_fuente" value="bold">
                        <label for="Masculino"><strong>Masculino</strong></label>
                        <input type="radio" id=" name=" estilo_fuente" value="normal">
                        <label for="Femenino"><strong>Femenino</strong></label>
                        <input type="radio" id=" name=" estilo_fuente" value="normal">
                        <label for="Prefiero no decirlo"><strong>Prefiero no decirlo</strong></label>
                        <br>
                        <input type="checkbox" id="Descripcion sobre ti" name="Descripcion sobre ti">
                        <label for="acepto">Acepto los términos y condiciones</label>
                    </div>
                    <div>
                        <label for="comentario">Comentario:</label>
                        <textarea id="comentario" name="comentario" rows="4" cols="30"></textarea>
                    </div>
                </div>
            </div>
        </div>
        </body>
