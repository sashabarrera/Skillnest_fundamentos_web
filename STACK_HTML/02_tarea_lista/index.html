    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas - listas</title>
</head>
<body>
    <h1>Lista</h1>
    <hr>
    <h2>Lista desordenada</h2>
    <ul>
        <li>Manzanas</li>
        <li>Plátanos</li>
        <li>Uvas</li>
        <li>Leche</li>
        <li>Yogurt</li>
        <li>Queso</li>
        <li>Cereal</li>
        <li>Pan</li>
    </ul>
    <hr>
    <h2>Lista ordenada</h2>
    <ol>
        <li>Regar plantas</li>
        <li>Lavar ropa</li>
        <li>Limpiar la casa</li>
        <li>Hacer ejercicio</li>
        <li>Leer un libro</li>
        <li>Cocinar la cena</li>
        <li>Hacer la tarea</li>
        <li>Llamar a un amigo</li>
    </ol>
    
</body>
</html>
