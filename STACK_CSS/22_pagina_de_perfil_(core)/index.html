<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="autho" content="Sasha Barrera">
    <title>Document</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header class="header">
        <nav class="nav">
            <h1>Perfil</h1>
            <div class="Nav-links">
                <a href="#">Inicio</a>
                <a href="#">Mi perfil</a>
                <a href="#">Conexiones</a>
                <button class="btn-nav">Cerrar sesión</button>
            </div>
        </nav>
    </header>
    <main class="main">
        <section class="columna-izquierda">
            <div class="superior-tarjeta">
            </div>
            <div class="descripcion-tarjeta">
                <div class="usuario">
                    <img src="static/images/user-icon.png" alt="Perfil">
                </div>
                <h1>Jane Doe</h1>
                <h2 class="descripcion">Bergen, Noruega</h2>
                <p class="parrafo">Desarrollador Frontend
                    Conocimientos en HTML,CSS y JavaScript</p>
                <div class="descripcion-link">
                    <a href="#">⚙ Editar Perfil</a>
                </div>
            </div>
        </section>
        <section class="columna-derecha">
            <div class="tarjeta-solicitudes">
                <div class="row">
                    <h2>Solitudes de conexión</h2> <button>Ver todas</button>
                </div>
                <div class="row">
                    <div class="row-contacto">
                        <img src="static/images/user-icon.png" alt="FotodePerfil">
                        <p>Steve Jobs</p>
                    </div>
                    <div class="row-botones">
                        <div class="btn">✅</div>
                        <div class="btn delete">X</div>
                    </div>
                </div>
                <div class="row">
                    <div class="row-contacto">
                        <img src="static/images/user-icon.png" alt="FotodePerfil">
                        <p>Bill Gates</p>
                    </div>
                    <div class="row-botones">
                        <div class="btn">✅</div>
                        <div class="btn delete">X</div>
                    </div>
                </div>
            </div>
            <section class="tarjeta">
                <div class="row">
                    <h2 class="h2">Tus Conexiones</h2><button>Ver todas</button>
                </div>
                <div class="contenido">
                    <div class="row-contacto">
                        <img src="static/images/user-icon.png" alt="FotodePerfil">
                        <p>Richard Stallman</p>
                    </div>
                    <div class="row-contacto">
                        <img src="static/images/user-icon.png" alt="FotodePerfil">
                        <p>Linus Torvalds</p>
                    </div>
                    <div class="row-contacto">
                        <img src="static/images/user-icon.png" alt="FotodePerfil">
                        <p>Ada Lovelace</p>
                    </div>
                    <div class="row-contacto">
                        <img src="static/images/user-icon.png" alt="FotodePerfil">
                        <p>Grace Hopper</p>
                    </div>
                </div>
            </section>
        </section>
