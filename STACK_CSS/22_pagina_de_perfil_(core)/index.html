<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="autho" content="Sasha Barrera">
    <title>Document</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header class="header">
        <nav class="nav">
            <h1>Perfil</h1>
            <div class="Nav-links">
                <a href="#">Inicio</a>
                <a href="#">Mi perfil</a>
                <a href="#">Conexiones</a>
                <button class="btn-nav">Cerrar sesión</button>
            </div>
        </nav>
    </header>
    <main class="main">
        <section class="columna-izquierda">
            <div class="perfil">
                <div class="superior-tarjeta">
                </div>
                <div class="descripcion-tarjeta">
                    <img src="static/images/images.jpg" alt="Perfil">
                    <h1>Jane Doe</h1>
                    <h3 class="descripcion">Bergen, Noruega</h3>
                    <p>Desarrollador Frontend
                        Conocimientos en HTML,CSS y JavaScript</p>
                    <div class="descripcion-link">
                        <a href="#">⚙ Editar Perfil</a>
                    </div>
                </div>
            </div>
        </section>
        <section class="columna-derecha">
            <div class="tarjeta-conexiones">
            </div>
            <div class="tarjeta-solicitudes">
                <h2>Solitudes de conexión <button>Ver todas</button></h2>
                <div>
                    <img src="static/images/user-icon.png" alt="FotodePerfil">
                    <p>Steve Jobs</p>
                    <img src="static/images/user-icon.png" alt="FotodePerfil">
                    <p>Bill Gates</p>
                </div>
            </div>
            <section class="tarjeta">
                <h2>Tus Conexiones <button>Ver todas</button></h2>
                <div class="contenido">
                    <img src="static/images/" alt="FotodePerfil">
                    <p>Richard Stallman</p>
                    <img src="static/images/" alt="FotodePerfil">
                    <p>Linus Torvalds</p>
                    <img src="static/images/" alt="FotodePerfil">
                    <p>Ada Lovelace</p>
                    <img src="static/images/" alt="FotodePerfil">
                    <p>Grace Hopper</p>
                </div>
            </section>
            </div>
        </section>
    </main>

</body>

</html>
