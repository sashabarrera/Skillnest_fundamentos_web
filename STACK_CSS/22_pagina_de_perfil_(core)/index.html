<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Sasha Barrera">
    <title>Pagina de perfil</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header class="encabezado">
        <nav class="barra">
            <h1>Perfil</h1>
            <div class="nav">
                <a href="#">Inicio</a>
                <a href="#">Mi perfil</a>
                <a href="#">Conexiones</a>
                <button class="btn-nav">Cerrar sesión</button>
            </div>
        </nav>
    </header>
    <main class="main">
        <div class="col-izquierda">
            <section class="perfil">
                <img src="static/images/" alt="FotodePerfil">
                <div class="superior-tarjeta"></div>
                <div class="descripcion">
                    <h2>Jane Doe</h2>
                    <div class="texto">
                        <p>Begen, Noruega</p>
                        <h2>Desarrollandora Frontend Conocimientos en HTML, CSS, JavaScript </h2>
                    </div>
                    <div class="Azul">
                        <p>⚙️ Editar perfil</p>
                    </div>
                </div>
            </section>
        </div>
        <div class="col-derecha">
            <main class="tarjeta1">
                <h2>Solitudes de conexión <button>Ver todas</button></h2>
                <div>
                    <img src="static/images/" alt="FotodePerfil">
                    <p>Steve Jobs</p>
                    <img src="static/images/" alt="FotodePerfil">
                    <p>Bill Gates</p>
                </div>
            </main>
            <section class="tarjeta2">
                <h2>Tus Conexiones <button>Ver todas</button></h2>
                <div class="contenido">
                    <img src="static/images/" alt="FotodePerfil">
                    <p>Richard Stallman</p>
                    <img src="static/images/" alt="FotodePerfil">
                    <p>Linus Torvalds</p>
                    <img src="static/images/" alt="FotodePerfil">
                    <p>Ada Lovelace</p>
                    <img src="static/images/" alt="FotodePerfil">
                    <p>Grace Hopper</p>
                </div>
            </section>
        </div>

    </main>

</body>

</html>
