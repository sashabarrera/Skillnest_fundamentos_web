<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Sasha Barrera">
    <title>Ejemplo mini-sitio inline-block</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <!--HEADER-->
    <header class="header">
        <h1>Mi sitio web</h1>
        <nav class="menu"><!--Menu navegacion-->
            <a href="#" class="boton">Inicio</a>
            <a href="#" class="boton">Servicio</a>
            <a href="#" class="boton">Contacto</a>
        </nav>
    </header>
    <main class="contenedor_principal">
        <!--Texto con elementos inline -->
        <section>
            <h2>Texto con elementos inline</h2>
            <p>
                Este es un ejemplo donde usamos <span class="resaltando">inline</span> para resaltar
                texto sin romper la linea de parrafo.
            </p>
        </section>
        <!--Tarjetas (inline-block)-->
        <section class="contenedor_tarjeta">
            <h2>Tarjetas (inline-block)</h2>
            <div class="box">Tarjeta 1</div>
            <div class="box">Tarejeta 2</div>
            <div class="box">Tarjeta 3</div>
        </section>
        <!--Bloques (block) -->
        <section>
            <h2>Bloques (Block)</h2>
            <div class="bloque">Bloque 1</div>
            <div class="bloque">Bloque 2</div>
            <div class="bloque">Bloque 3</div>
        </section>
    </main>
    <!--FOOTER-->
    <Footer class="footer">
        <p>2026 - Todos los derechos resaltando</p>
    </Footer>
</body>
</html>
