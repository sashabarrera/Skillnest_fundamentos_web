<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Angelo Pomasongo, Diego Valenzuela, Sasha Barrera">
    <title>Encarga tu pedido</title>
    <link rel="stylesheet" href="/STACK_CSS/Disertacion/static/css/style.css">
</head>

<body>
    <header class="header">
        <!-- Contenedor principal de la barra de navegación -->
        <div class="NAVEGACION">

            <!-- Grupo izquierdo: Mantiene el logo y los enlaces juntos -->
            <div class="bloque-izquierdo">
                <nav>
                    <!-- Logo oficial de KFC -->
                    <a href="/STACK_CSS/Disertacion/index.html" target="_blank">
                        <img src="/STACK_CSS/Disertacion/static/images/image1.png" alt="KFC">
                    </a>
                </nav>
                <section class="links">
                    <!-- Enlaces principales de navegación rápida -->
                    <a href="/STACK_CSS/Disertacion/static/pages/Pedir.html">Pedir</a>
                    <a href="/STACK_CSS/Disertacion/static/pages/Contactos.html">Contactos</a>
                    <a href="/STACK_CSS/Disertacion/static/pages/Restaurantes.html">Restaurantes</a>
                    <a href="#">Nosotros</a>
                </section>
            </div>

            <!-- Grupo derecho: Contiene las acciones de usuario y carrito -->
            <section class="busqueda">
                <!-- Icono de perfil de usuario -->
                <div>
                    <img src="/STACK_CSS/Disertacion/static/images/image2.png" alt="Perfil">
                </div>
                <!-- Botón de inicio de sesión -->
                <div>
                    <button class="btn">Ingresar</button>
                </div>
                <!-- Icono de bolsa de compras / carrito -->
                <div>
                    <img src="/STACK_CSS/Disertacion/static/images/image3.png" alt="Carrito">
                </div>
            </section>
        </div>
        <section class="Textito">
            <div class="Enlaces" >
            <p>Inicio  > </p>
            <p>Pedir > </p>
            <p>Contacto > </p>
            </div>
            <div class="Bienvenido" >
                <h1>
                    HOLA,BIENVENIDO/A A KFC CHILE
                </h1>
            </div>
        </section>
</body>

</html>
