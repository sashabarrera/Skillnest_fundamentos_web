<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Angelo Pomasongo, Diego Valenzuela, Sasha Barrera">
    <title>Encarga tu pedido</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header class="header">
        <!-- Contenedor principal de la barra de navegación -->
        <div class="NAVEGACION">

            <!-- Grupo izquierdo: Mantiene el logo y los enlaces juntos -->
            <div class="bloque-izquierdo">
                <nav>
                    <!-- Logo oficial de KFC -->
                    <img src="static/images/image1.png" alt="KFC">
                </nav>
                <section class="links">
                    <!-- Enlaces principales de navegación rápida -->
                    <a href="static/pages/Pedir.html">Pedir</a>
                    <a href="static/pages/Contactos.html">Contactos</a>
                    <a href="static/pages/Restaurantes.html">Restaurantes</a>
                    <a href="#">Nosotros</a>
                </section>
            </div>

            <!-- Grupo derecho: Contiene las acciones de usuario y carrito -->
            <section class="busqueda">
                <!-- Icono de perfil de usuario -->
                <div>
                    <img src="static/images/image2.png" alt="Perfil">
                </div>
                <!-- Botón de inicio de sesión -->
                <div>
                    <button class="btn" onclick="iniciarSesion()">Ingresar</button>
                </div>
                <!-- Icono de bolsa de compras / carrito -->
                <div>
                    <img src="static/images/image3.png" alt="Carrito">
                </div>
            </section>
        </div>
        <section>
            <div class="Promos">
                <img src="static/images/image4.png" alt="Promos">
            </div>
            <div class="Orden">
                <p>¿CÓMO TE GUSTARÍA ORDENAR HOY?</p>
                <div>
                    <img src="static/images/image5.png" alt="Pedido">
                </div>
            </div>
        </section>
    </header>
    <script src="static/js/scripts.js"></script>
</body>

</html>
