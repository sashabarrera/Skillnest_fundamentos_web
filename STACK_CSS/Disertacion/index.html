<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Encarga tu pedido</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header class="header">
        <div class="NAVEGACION"><!--BARRA DE NAVEGACION (pedir, contacto, restaurante,  nosotros)-->
            <nav class="barra">
                <img src="static/images/image1.png" alt="KFC"> <!--IMAGEN KFC-->
            </nav>
            <section class="links">
                <a href="#">Pedir</a> <!--LINK PARA BARRA DE NAVEGACION (text decorection:none)-->
                <a href="#">Contactos</a>
                <a href="#">Restaurantes</a>
                <a href="#">Nosotros</a>
            </section>
            <section class="busqueda">
                <div class="imagen">
                    <img src="static/images/image2.png" alt=""><!--IMGEN DEL PERFIL-->
                </div>
                <div>
                    <button class="btn">Ingresar</button><!--BOTON INGRESAR PONER JAVASCRIPTS-->
                </div>
                <div class="carrito">
                    <img src="static/images/image.png" alt=""><!--IMAGEN DE CARRITO-->
                </div>
            </section>
        </div>
    </header>
    <script src="static/js/scripts.js"></script>

</html>
