<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Sasha Barrera"
    <title>Tamaños en CSS</title>
    <!-- Link css -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <header class="encabezado">
        <h1 class="titulo_header">Tamaños en CSS</h1>
    </header>
    <main class="container">
        <h2>Ejemplos:</h2>
        <section class="row"> <!-- Row : fila -->
            <h3 class="cursiva">Ejemplo 1: Botón</h3>
            <button>Aceptar</button>
            <h3 class="cursiva">Ejemplo 2: Caja con el 80% de ancho</h3>
            <div class="caja1"></div>
            <h3 class="cursiva">Ejemplo 3: Parrafo</h3>
            <p class="parrafo1">Parrafo de ejemplo</p>
            <h3 class="cursiva">Ejemplo 4: Link</h3>
            <a class="link1" href="#">Click aqui</a>
        </section>
        <hr>
        <section class="row">
            <h3 class="cursiva">Ejemplo 5: Uso de overflow</h3>
            <h2>Aplicando overflow</h2>
            <div class="caja hidden">
                <p>Ejemplo: hidden</p>
                <div class="example1"></div>
            </div>
            <div class="caja scroll">
                <p>Ejemplo: scroll</p>
                <div class="example2"></div>
            </div>
            <div class="caja auto">
                <p>Ejemplo: auto</p>
                <div class="example3"></div>
            </div>
        </section>
        <hr>
        <section class="row">
            <h2>Sin overflow</h2>
            <div class="caja ">
                <div class="example1"></div>
            </div>
            <div class="caja">
                <div class="example2"></div>
            </div>
            <div class="caja ">
                <div class="example3"></div>
            </div>
        </section>
        <section class="row">
        <h3 class="cursiva">Ejemplo 6: Fondos</h3>
        <div class="banner"></div>
        </section>
    </main>
    <!-- Link js -->
    <script src="static/js/script.js"></script>
</body>
</html>
